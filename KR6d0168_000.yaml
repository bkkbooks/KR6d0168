front:
  text: 四教頌七賢七位藏初機通教位中一二齊別信并圓五品位見思初伏在凡居果位須陀預聖流與通三四地齊儔并連別住圓初信八十八使正方休圓別信住二之七藏通極果皆同級同除四住證偏真內外塵沙分斷伏八之十信二惑空假成俗備理方通齊前別住後三位并連行向位相同別地全齊圓住平無明分斷證真因等妙二覺初二行進聞三位不知名四教儀緣起宋修僧史僧統贊寧通惠録云唐末吳越錢忠懿王治國之暇究心內典因閲永嘉集有同除四住此處為齊若伏無明三藏則劣之句不曉問于雪居韶國師乃云天台國清寺有寂法師善弘教法必解此語王召法師至詰焉法師曰此天台智者大師妙玄中文時遭安史兵殘近則會昌焚毀中國教藏殘闕殆盡今惟海東高麗闡教方盛全書在彼王聞之慨然即為遣國書贄弊使高麗求取一家章疏高麗國君乃敕僧曰諦觀者報聘以天台教部還歸于我觀既至就稟學寂公于螺溪終焉大教至是重昌矣觀能探索大本録出四教儀之文成二卷其上卷明一家判教立義下卷明南北諸師宗途異計後至孤山圓法師校勘刊板但行今上卷之文者蓋由辭句簡要義旨易明學者誠資之可了其一化大綱豈曰小補之哉下卷則破斥南北古師文義浩漫故得以緩之如此文末指云自從此下略明諸家判教儀式抑可見後卷之大略也王為寂師建伽藍螺溪之上曰定慧院進號淨光大師追諡九祖并東還教藏悉付於師教門中興實基於此而韶公適與智者同姓乃又毗贊宗乘且居鄰佛隴人咸疑其為智者後身云四明草菴法師道因教苑遺事云昔智者禪師創放生池於海涯其放之也必為授歸戒説大法然後縱之海中智者滅後至唐末中國天台之道浸息而海東高麗新羅諸國盛弘此教扶宗繼忠法師云智者緣在此方而教敷于海東者此必放生池中諸魚聞教稟戒報生者爾然聞此説者頗譏以為誕殊不知教理有憑也流水十千天子即脫魚報豈外此乎明萬曆九年冬沙門智覺於淨業堂校梓刻天台四教儀引客歲拙園成名其堂曰淨業屬臥痾餘日因從三四淨侶掩關結夏其中三時禮課求生西方宴坐焚香研精藏典鐘磬間發白雲乍留鳥低飛而親人草蔓生而沒徑𮖜遺巍闕機息漢陰意欣欣甚適也已僧真覺者自武林來進余以天台之學余首肯焉為留旬日剖析教觀大旨余若有悟入者遂合掌佛前願世世奉揚台宗淨佛國土蓋淨侶同時發心永為主伴矣台教源流具四明磐公所撰佛祖統紀而四教儀者則高麗沙門諦觀稟法華玄文而録出者也書凡二卷上卷明一家判教之義下卷明南北諸師宗途異計今所傳者上卷耳言約義該實為台教之關鑰學者了此則一化大綱思過半矣南天竺沙門蒙潤有集注三卷亦精核可喜近吳中有刻本焉掩關凡兩月既出則復濫世罔遂不能保淨戒啖酒肉近妻子如曩時客有幼迷於他鄉者一旦人告之曰子之家在某所父兄宗族墳墓田宅種種可念也其人即留滯不能遽返豈作他鄉人哉今歲春余且以一命棄青山行有日矣因追前志捨資刻四教儀一卷并科文行于世同志者其遂執鑰洞關以窮海藏令一家教觀如日輪當午川流赴壑即余留滯他鄉可藉以懺悔矣其勉之哉其勉之哉壬午春佛歡喜日病居士馮夢禎撰
